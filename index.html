<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>duki.lol</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        body {
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(255, 87, 87);
        }

        .content {
            padding: 2rem 50px;
            max-width: 1200px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgb(255, 60, 60);
            padding: 0.5rem 2rem;
            color: #ffbbbb;
            position: sticky;
            top: 0;
            z-index: 2000;
        }

        .nav-links {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links li {
            margin-right: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
        }

        .nav-links a:hover {
            color: #ffa8a8;
        }

        .teto-container {
            position: fixed;
            bottom: 0;
            right: 20px;
            width: 300px;
            height: 120px;
            z-index: 1000;
        }

        .bottom-right-peek {
            position: absolute;
            bottom: -215px;
            right: 0;
            width: 300px;
            transition: bottom 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55),
                        transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            pointer-events: none;
        }

        .teto-container:hover .bottom-right-peek {
            bottom: -10px;
            transform: scale(1.05);
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(280px, 380px);
            gap: 32px;
            align-items: center;
            padding-top: 2rem;
        }

        .hero h1 {
            margin: 0 0 12px;
            font-size: clamp(3rem, 8vw, 6rem);
            letter-spacing: 0.02em;
        }

        .hero p {
            margin: 0 0 18px;
            max-width: 620px;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 24px;
            padding: 24px;
        }

        .hero-card img {
            width: 100%;
            display: block;
            border-radius: 18px;
        }

        @media (max-width: 800px) {
            .content {
                padding: 1.5rem 20px;
            }

            .navbar {
                padding: 0.75rem 1rem;
            }

            .hero {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <ul class="nav-links">
            <li>
                <a href="index.html">
                    <img src="assets/miku.webp" alt="miku" style="width: 30px; height: 30px; margin-right: 6px;">
                    Home
                </a>
            </li>
            <li>
                <a href="about.html">
                    <img src="assets/neru.webp" alt="neru" style="width: 30px; height: 30px; margin-right: 6px;">
                    About
                </a>
            </li>
        </ul>

        <div class="icon">
            <img src="assets/teto.webp" alt="icon" width="40">
        </div>
    </nav>

    <div class="content">
        <section class="hero">
            <div>
                <h1>duki's scripts</h1>
                <p>placeholder text for the new <strong>duki.lol</strong> home page. you can expect the full update soon, or maybe not. i don't know!</p>
            </div>
            <div class="hero-card">
                <img src="assets/defoko.png" alt="defoko placeholder">
            </div>
        </section>
    </div>

    <div class="teto-container">
        <img src="assets/teto2.png" class="bottom-right-peek" alt="Teto" width="300" height="300">
    </div>
</body>
</html>
