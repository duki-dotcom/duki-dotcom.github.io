<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>duki.lol - about</title>
    <link class="icon" type="image/x-icon" href="favicon.ico">
    <style>
        body {
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgb(255, 87, 87);
        }

        .content {
            padding: 2rem 50px;
            max-width: 1200px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgb(255, 60, 60);
            padding: 1rem 2rem;
            color: #ffbbbb;
        }

        .nav-links {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links li {
            margin-left: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
        }

        .nav-links a:hover {
            color:#ffa8a8
        }

        .teto-container {
            position: fixed;
            bottom: 0;
            right: 20px;
            width: 300px;
            height: 120px;
            z-index: 1000;
        }

        .bottom-right-peek {
            position: absolute;
            bottom: -215px;
            right: 0;
            width: 300px;
            transition: bottom 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55),
                        transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            pointer-events: none;
        }

        .teto-container:hover .bottom-right-peek {
            bottom: -10px;
            transform: scale(1.05);
        }

        .about-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(280px, 380px);
            gap: 32px;
            align-items: start;
            padding-top: 2rem;
        }

        .panel {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 24px;
            padding: 24px;
        }

        .panel h1:first-child {
            margin-top: 0;
        }

        .about-grid img {
            width: 100%;
            display: block;
            border-radius: 18px;
        }

        @media (max-width: 800px) {
            .content {
                padding: 1.5rem 20px;
            }

            .navbar {
                padding: 0.75rem 1rem;
            }

            .about-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <ul class="nav-links">
            <li>
                <a href="/">
                    <img src="/assets/miku.webp" alt="miku" style="width: 30px; height: 30px; margin-right: 6px; vertical-align: middle;">
                    Home
                </a>
            </li>
            <li>
                <a href="/about">
                    <img src="/assets/neru.webp" alt="neru" style="width: 30px; height: 30px; margin-right: 6px; vertical-align: middle;">
                    About
                </a>
            </li>
        </ul>
        <div class="icon">
            <img src="/assets/teto.webp" alt="icon" width="40">
        </div>
    </nav>

    <div class="content">
        <section class="about-grid">
            <div class="panel">
                <h1>About</h1>
                <h2>placeholder</h2>
                <p>this is empty still ok</p>
                <p>calma</p>
            </div>
            <div>
                <img src="/assets/defoko.png" alt="defoko placeholder">
            </div>
        </section>
    </div>

    <div class="teto-container">
        <img src="/assets/teto2.png" class="bottom-right-peek" alt="Teto" width="300" height="300">
    </div>
</body>
</html>
